<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalMind</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #1a1d24;
            --panel:    #1f2330;
            --input:    #252a38;
            --border:   rgba(255,255,255,0.06);
            --border2:  rgba(255,255,255,0.10);
            --text:     #e8eaf0;
            --sub:      #7a8099;
            --faint:    #454c66;
            --orange:   #e8721c;
            --blue:     #3a7bd5;
            --blue-dim: #1a3a6e;
            --red-light:#e8604a;
            --user-fg:  #fff8f4;
        }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            height: 54px;
            background: var(--panel);
            border-bottom: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }

        .brand {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); }

        .status-wrap {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            color: var(--sub);
        }

        .pip {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--faint); flex-shrink: 0; transition: background 0.4s;
        }
        .pip.on   { background: var(--blue); }
        .pip.err  { background: var(--red-light); }
        .pip.spin { background: var(--orange); animation: blink 1.2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
        }
        #chat::-webkit-scrollbar { width: 3px; }
        #chat::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }

        #welcome {
            margin: auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding-bottom: 48px;
            padding: 0 20px 48px;
        }

        #welcome h1 {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: var(--text);
        }
        #welcome h1 span { color: var(--orange); }

        #welcome p {
            font-size: 13px;
            color: var(--sub);
            max-width: 240px;
            line-height: 1.65;
        }

        .bar-track {
            width: 120px; height: 2px;
            background: var(--border2); border-radius: 2px;
            overflow: hidden; margin-top: 16px;
        }
        .bar-fill {
            height: 100%; width: 50%;
            background: var(--orange);
            animation: run 1.5s ease-in-out infinite;
        }
        @keyframes run { 0%{transform:translateX(-150%)} 100%{transform:translateX(380%)} }

        .row {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        .row.user { align-items: flex-end; }
        .row.ai   { align-items: flex-start; }

        .row-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--sub);
            margin-bottom: 4px;
        }

        .bubble {
            font-size: 14px;
            line-height: 1.68;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 85%;
        }

        .bubble.user {
            background: var(--orange);
            color: var(--user-fg);
            padding: 9px 14px;
            border-radius: 10px 10px 3px 10px;
        }

        .bubble.error-msg { color: var(--red-light); }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 10px 4px 4px;
        }
        .typing-dots span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--sub);
            animation: bounce 1.2s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
        @keyframes bounce {
            0%,60%,100% { transform: translateY(0); opacity: 0.35; }
            30%          { transform: translateY(-6px); opacity: 1; }
        }

        .math-result {
            display: inline-block;
            margin-top: 8px;
            background: var(--blue-dim);
            border: 1px solid var(--blue);
            border-radius: 7px;
            padding: 8px 14px;
            font-family: 'SF Mono', ui-monospace, monospace;
            font-size: 13px;
            color: #a8c8f8;
        }

        .input-bar {
            background: var(--panel);
            border-top: 1px solid var(--border2);
            padding: 12px 16px 14px;
            flex-shrink: 0;
        }

        .input-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--input);
            border: 1px solid var(--border2);
            border-radius: 11px;
            padding: 7px 7px 7px 13px;
            transition: border-color 0.2s;
        }
        .input-inner:focus-within { border-color: var(--orange); }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text);
            resize: none;
            min-height: 24px;
            max-height: 100px;
            line-height: 1.6;
            padding: 2px 0;
        }
        #userInput::placeholder { color: var(--faint); }
        #userInput:disabled { cursor: not-allowed; }

        #sendBtn {
            width: 32px; height: 32px;
            flex-shrink: 0;
            border: none;
            border-radius: 7px;
            background: var(--orange);
            color: var(--user-fg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        #sendBtn:hover:not(:disabled) { opacity: 0.8; }
        #sendBtn:active:not(:disabled) { transform: scale(0.93); }
        #sendBtn:disabled { opacity: 0.25; cursor: default; }
        #sendBtn svg { width: 14px; height: 14px; }

        .hint {
            font-size: 11px;
            color: var(--faint);
            text-align: center;
            margin-top: 7px;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="brand-dot"></div>
        LocalMind
    </div>
    <div class="status-wrap">
        <div class="pip spin" id="pip"></div>
        <span id="statusText">Loading model</span>
    </div>
</header>

<div id="chat">
    <div id="welcome">
        <h1><span>Local</span>Mind</h1>
        <p>Downloading AI model into your browser. Only happens once.</p>
        <div class="bar-track"><div class="bar-fill"></div></div>
    </div>
</div>

<div class="input-bar">
    <div class="input-inner">
        <textarea id="userInput" rows="1" placeholder="Waiting for model..." disabled></textarea>
        <button id="sendBtn" disabled aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </button>
    </div>
    <div class="hint">Enter to send &nbsp;&middot;&nbsp; Shift+Enter for new line</div>
</div>

<script type="module">
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

let gen;
let history = [];

const chatEl   = document.getElementById('chat');
const welcome  = document.getElementById('welcome');
const input    = document.getElementById('userInput');
const btn      = document.getElementById('sendBtn');
const pipEl    = document.getElementById('pip');
const statusEl = document.getElementById('statusText');

function setStatus(msg, state) {
    statusEl.textContent = msg;
    pipEl.className = 'pip ' + (state || 'spin');
}

function tryMath(raw) {
    let e = raw
        .replace(/[×x]/gi,'*').replace(/÷/g,'/').replace(/\^/g,'**')
        .replace(/,/g,'')
        .replace(/^(what is|calculate|compute|solve|how much is)\s+/i,'')
        .replace(/\?$/,'').trim();
    if (!/^[\d\s\+\-\*\/\(\)\.\%\*]+$/.test(e) || e.length < 2) return null;
    try {
        const r = Function('"use strict";return(' + e + ')')();
        if (typeof r === 'number' && isFinite(r))
            return { e, r: Number.isInteger(r) ? r : parseFloat(r.toFixed(10)) };
    } catch(_) {}
    return null;
}

function addMsg(text, role, html) {
    if (welcome.parentNode) welcome.remove();
    const row = document.createElement('div');
    row.className = 'row ' + role;
    const lbl = document.createElement('div');
    lbl.className = 'row-label';
    lbl.textContent = role === 'user' ? 'You' : 'LocalMind';
    const bub = document.createElement('div');
    bub.className = 'bubble ' + role;
    if (html) bub.innerHTML = text;
    else bub.textContent = text;
    row.append(lbl, bub);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bub;
}

function addTyping() {
    if (welcome.parentNode) welcome.remove();
    const row = document.createElement('div');
    row.className = 'row ai';
    const lbl = document.createElement('div');
    lbl.className = 'row-label';
    lbl.textContent = 'LocalMind';
    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    row.append(lbl, dots);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return row;
}

async function load() {
    try {
        // SmolLM2 is much smaller (360MB vs 500MB) — better for mobile
        // Using wasm explicitly to avoid WebGPU adapter errors
        gen = await pipeline('text-generation', 'HuggingFaceTB/SmolLM2-360M-Instruct', {
            device: 'wasm',
            dtype: 'q8',
        });
        setStatus('Ready', 'on');
        input.placeholder = 'Ask anything...';
        input.disabled = false;
        btn.disabled = false;
        input.focus();
        if (welcome.parentNode) {
            welcome.querySelector('h1').innerHTML = '<span>Local</span>Mind';
            welcome.querySelector('p').textContent = 'Ready. Works offline. Remembers this conversation.';
            welcome.querySelector('.bar-track')?.remove();
        }
    } catch(e) {
        setStatus('Failed to load', 'err');
        console.error(e);
    }
}

async function send() {
    const text = input.value.trim();
    if (!text || !gen) return;
    input.value = '';
    input.style.height = 'auto';
    input.disabled = true;
    btn.disabled = true;

    addMsg(text, 'user');

    const math = tryMath(text);
    if (math) {
        addMsg(`<div class="math-result">${math.e} = ${math.r}</div>`, 'ai', true);
        input.disabled = false; btn.disabled = false; input.focus();
        return;
    }

    const typingRow = addTyping();

    history.push({ role: 'user', content: text });

    try {
        const out = await gen(
            [
                {
                    role: 'system',
                    content: 'You are LocalMind, a concise AI assistant. Give short, direct answers. No rambling. Maximum 3 sentences unless the user asks for more detail.'
                },
                ...history.slice(-12)
            ],
            { max_new_tokens: 120, temperature: 0.6, repetition_penalty: 1.2, do_sample: true }
        );
        const reply = out[0].generated_text;
        const content = reply[reply.length - 1].content;
        history.push({ role: 'assistant', content });
        typingRow.remove();
        addMsg(content, 'ai');
    } catch(err) {
        typingRow.remove();
        const bub = addMsg('Something went wrong. Please try again.', 'ai');
        bub.classList.add('error-msg');
        console.error(err);
    }

    input.disabled = false;
    btn.disabled = false;
    input.focus();
    chatEl.scrollTop = chatEl.scrollHeight;
}

input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
});
input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!input.disabled) send(); }
});
btn.addEventListener('click', send);
load();
</script>
</body>
</html>
