<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalMind</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #1a1d24;
            --panel:     #1f2330;
            --input:     #252a38;
            --border:    rgba(255,255,255,0.06);
            --border2:   rgba(255,255,255,0.10);
            --text:      #e8eaf0;
            --sub:       #7a8099;
            --faint:     #454c66;
            --orange:    #e8721c;
            --orange-dim:#7a3a0a;
            --blue:      #3a7bd5;
            --blue-dim:  #1a3a6e;
            --red:       #c0392b;
            --red-light: #e8604a;
            --user-bg:   #e8721c;
            --user-fg:   #fff8f4;
        }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            height: 54px;
            background: var(--panel);
            border-bottom: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            flex-shrink: 0;
        }

        .brand {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.1px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--orange);
        }

        .status-wrap {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            color: var(--sub);
        }

        .pip {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--faint);
            flex-shrink: 0;
            transition: background 0.4s;
        }
        .pip.on   { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
        .pip.err  { background: var(--red-light); }
        .pip.spin { animation: blink 1.2s ease-in-out infinite; background: var(--orange); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 36px 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 26px;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
        }
        #chat::-webkit-scrollbar { width: 3px; }
        #chat::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }

        #welcome {
            margin: auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding-bottom: 48px;
        }

        #welcome h1 {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.4px;
            color: var(--text);
        }

        #welcome h1 span { color: var(--orange); }

        #welcome p {
            font-size: 13px;
            color: var(--sub);
            max-width: 260px;
            line-height: 1.65;
        }

        .bar-track {
            width: 130px;
            height: 2px;
            background: var(--border2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 18px;
        }
        .bar-fill {
            height: 100%;
            width: 50%;
            background: var(--orange);
            animation: run 1.5s ease-in-out infinite;
        }
        @keyframes run { 0%{transform:translateX(-150%)} 100%{transform:translateX(380%)} }

        .row {
            max-width: 640px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .row-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .row-label.you,
        .row-label.ai  { color: var(--sub); }

        .bubble {
            font-size: 14.5px;
            line-height: 1.72;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .bubble.user {
            align-self: flex-start;
            background: var(--orange);
            color: var(--user-fg);
            padding: 10px 15px;
            border-radius: 10px 10px 10px 3px;
            font-size: 14px;
            line-height: 1.58;
            max-width: 82%;
        }

        .bubble.muted {
            color: var(--faint);
            font-style: italic;
        }

        .bubble.error-msg { color: var(--red-light); }

        .math-result {
            display: inline-block;
            margin-top: 10px;
            background: var(--blue-dim);
            border: 1px solid var(--blue);
            border-radius: 7px;
            padding: 9px 15px;
            font-family: 'SF Mono', ui-monospace, monospace;
            font-size: 14px;
            color: #a8c8f8;
        }

        .input-bar {
            background: var(--panel);
            border-top: 1px solid var(--border2);
            padding: 13px 28px 15px;
            flex-shrink: 0;
        }

        .input-inner {
            max-width: 640px;
            margin: 0 auto;
            display: flex;
            align-items: flex-end;
            gap: 9px;
            background: var(--input);
            border: 1px solid var(--border2);
            border-radius: 11px;
            padding: 7px 7px 7px 14px;
            transition: border-color 0.2s;
        }

        .input-inner:focus-within { border-color: var(--orange); }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text);
            resize: none;
            min-height: 24px;
            max-height: 110px;
            line-height: 1.6;
            padding: 2px 0;
        }
        #userInput::placeholder { color: var(--faint); }
        #userInput:disabled { cursor: not-allowed; }

        #sendBtn {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            border: none;
            border-radius: 7px;
            background: var(--orange);
            color: var(--user-fg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        #sendBtn:hover:not(:disabled) { opacity: 0.8; }
        #sendBtn:active:not(:disabled) { transform: scale(0.93); }
        #sendBtn:disabled { opacity: 0.25; cursor: default; }
        #sendBtn svg { width: 14px; height: 14px; }

        .hint {
            font-size: 11px;
            color: var(--faint);
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <div class="brand-dot"></div>
        LocalMind
    </div>
    <div class="status-wrap">
        <div class="pip spin" id="pip"></div>
        <span id="statusText">Loading model</span>
    </div>
</header>

<div id="chat">
    <div id="welcome">
        <h1><span>Local</span>Mind</h1>
        <p>Downloading the AI model into your browser. Only happens once — works offline after.</p>
        <div class="bar-track"><div class="bar-fill"></div></div>
    </div>
</div>

<div class="input-bar">
    <div class="input-inner">
        <textarea id="userInput" rows="1" placeholder="Waiting for model..." disabled></textarea>
        <button id="sendBtn" disabled aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </button>
    </div>
    <div class="hint">Enter to send &nbsp;&middot;&nbsp; Shift+Enter for new line</div>
</div>

<script type="module">
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

let gen;
let history = [];

const chatEl   = document.getElementById('chat');
const welcome  = document.getElementById('welcome');
const input    = document.getElementById('userInput');
const btn      = document.getElementById('sendBtn');
const pipEl    = document.getElementById('pip');
const statusEl = document.getElementById('statusText');

function setStatus(msg, state) {
    statusEl.textContent = msg;
    pipEl.className = 'pip ' + (state || 'spin');
}

function tryMath(raw) {
    let e = raw
        .replace(/[×x]/gi,'*').replace(/÷/g,'/').replace(/\^/g,'**')
        .replace(/,/g,'')
        .replace(/^(what is|calculate|compute|solve|how much is)\s+/i,'')
        .replace(/\?$/,'').trim();
    if (!/^[\d\s\+\-\*\/\(\)\.\%\*]+$/.test(e) || e.length < 2) return null;
    try {
        const r = Function('"use strict";return(' + e + ')')();
        if (typeof r === 'number' && isFinite(r))
            return { e, r: Number.isInteger(r) ? r : parseFloat(r.toFixed(10)) };
    } catch(_) {}
    return null;
}

function addMsg(text, role, html) {
    if (welcome.parentNode) welcome.remove();
    const row = document.createElement('div');
    row.className = 'row';
    const lbl = document.createElement('div');
    lbl.className = 'row-label ' + (role === 'user' ? 'you' : 'ai');
    lbl.textContent = role === 'user' ? 'You' : 'LocalMind';
    const bub = document.createElement('div');
    bub.className = 'bubble' + (role === 'user' ? ' user' : '');
    if (html) bub.innerHTML = text;
    else bub.textContent = text;
    row.append(lbl, bub);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bub;
}

async function load() {
    try {
        gen = await pipeline('text-generation', 'onnx-community/Qwen2.5-0.5B-Instruct');
        setStatus('Ready', 'on');
        input.placeholder = 'Ask anything...';
        input.disabled = false;
        btn.disabled = false;
        input.focus();
        if (welcome.parentNode) {
            welcome.querySelector('h1').innerHTML = '<span>Local</span>Mind is ready';
            welcome.querySelector('p').textContent = 'Model loaded. Works offline. Remembers this conversation.';
            welcome.querySelector('.bar-track')?.remove();
        }
    } catch(e) {
        setStatus('Failed to load', 'err');
    }
}

async function send() {
    const text = input.value.trim();
    if (!text || !gen) return;
    input.value = '';
    input.style.height = 'auto';
    input.disabled = true;
    btn.disabled = true;

    addMsg(text, 'user');

    const math = tryMath(text);
    if (math) {
        addMsg(`<div class="math-result">${math.e} = ${math.r}</div>`, 'ai', true);
        input.disabled = false; btn.disabled = false; input.focus();
        return;
    }

    const bub = addMsg('...', 'ai');
    bub.classList.add('muted');

    history.push({ role: 'user', content: text });

    try {
        const out = await gen(
            [{ role: 'system', content: 'You are LocalMind, a helpful and concise AI. Be clear and direct.' }, ...history.slice(-16)],
            { max_new_tokens: 220, temperature: 0.7, repetition_penalty: 1.15, do_sample: true }
        );
        const reply = out[0].generated_text;
        const content = reply[reply.length - 1].content;
        history.push({ role: 'assistant', content });
        bub.classList.remove('muted');
        bub.textContent = content;
    } catch(_) {
        bub.classList.remove('muted');
        bub.classList.add('error-msg');
        bub.textContent = 'Something went wrong. Please try again.';
    }

    input.disabled = false;
    btn.disabled = false;
    input.focus();
    chatEl.scrollTop = chatEl.scrollHeight;
}

input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 110) + 'px';
});
input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!input.disabled) send(); }
});
btn.addEventListener('click', send);
load();
</script>
</body>
</html>
