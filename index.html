<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #121212; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e1e1e; padding: 15px; text-align: center; border-bottom: 1px solid #2d2d2d; }
        #status { color: #888; font-size: 14px; margin-top: 5px; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 15px; line-height: 1.4; word-break: break-word; }
        .user-msg { background: #007acc; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #2d2d2d; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 2px; }
        input-area { background: #1e1e1e; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #2d2d2d; }
        input[type="text"] { flex: 1; background: #2d2d2d; border: 1px solid #444; padding: 12px; border-radius: 8px; color: white; font-size: 16px; outline: none; }
        input[type="text"]:disabled { opacity: 0.5; cursor: not-allowed; }
        button { background: #007acc; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #005999; }
        button:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <h2>Offline Browser AI</h2>
        <div id="status">Initializing AI Engine...</div>
    </header>

    <div id="chat-container">
        <div class="message ai-msg">Hello! Once the model finishes loading into your browser cache, you can safely turn off your Wi-Fi entirely.</div>
    </div>

    <input-area>
        <input type="text" id="userInput" placeholder="Waiting for engine to load..." disabled>
        <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </input-area>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

        let generator;
        const statusElement = document.getElementById('status');
        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('userInput');
        const sendButton = document.getElementById('sendBtn');

        async function loadAI() {
            try {
                statusElement.innerText = "Downloading lightweight model weights (~360MB)...";
                
                // Using SmolLM2-360M: Optimized for fast, error-free browser generation
                generator = await pipeline('text-generation', 'HuggingFaceTB/SmolLM2-360M-Instruct');
                
                statusElement.innerText = "AI Ready! (Safe to disconnect Wi-Fi)";
                statusElement.style.color = "#4caf50";
                inputField.placeholder = "Type your message here...";
                inputField.disabled = false;
                sendButton.disabled = false;
            } catch (error) {
                statusElement.innerText = "Error loading AI. Make sure you are using GitHub Pages or a local server.";
                statusElement.style.color = "#f44336";
                console.error(error);
            }
        }

        window.sendMessage = async function() {
            const text = inputField.value.trim();
            if (!text) return;

            appendMessage(text, 'user-msg');
            inputField.value = '';
            
            inputField.disabled = true;
            sendButton.disabled = true;

            const aiMessageElement = appendMessage("Thinking...", 'ai-msg');

            try {
                // Using standard conversational array structures for v3 compatibility
                const messages = [{ role: "user", content: text }];
                
                const output = await generator(messages, { 
                    max_new_tokens: 100,
                    temperature: 0.6,
                    repetition_penalty: 1.2
                });

                // Extract response cleanly without manual string splitting
                const reply = output[0].generated_text;
                const aiReply = reply[reply.length - 1].content;

                aiMessageElement.innerText = aiReply;
            } catch (err) {
                aiMessageElement.innerText = "Error generating response. Please try again.";
                console.error(err);
            }

            inputField.disabled = false;
            sendButton.disabled = false;
            inputField.focus();
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !inputField.disabled) {
                sendMessage();
            }
        });

        loadAI();
    </script>
</body>
</html>
